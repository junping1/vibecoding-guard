name: VibeCodingGuard

options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    macOS: "14.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  VibeCodingGuard:
    type: application
    platform: macOS
    sources:
      - path: Sources/VibeCodingGuard
      - path: Resources/Assets.xcassets
    dependencies:
      - sdk: ApplicationServices.framework
    info:
      path: packaging/Info.plist
      properties:
        CFBundleDevelopmentRegion: "$(DEVELOPMENT_LANGUAGE)"
        CFBundleDisplayName: "Vibe Coding Guard"
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleIconName: AppIcon
        CFBundleName: "$(PRODUCT_NAME)"
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "Personal local utility."
    settings:
      base:
        PRODUCT_NAME: "Vibe Coding Guard"
        EXECUTABLE_NAME: VibeCodingGuard
        PRODUCT_BUNDLE_IDENTIFIER: com.junping.vibecodingguard
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: 5W738VH83V
        ENABLE_HARDENED_RUNTIME: "YES"
        PROVISIONING_PROFILE_SPECIFIER: ""

schemes:
  VibeCodingGuard:
    build:
      targets:
        VibeCodingGuard: all
    run:
      config: Debug
    archive:
      config: Release
